stages:
  - build
  - package

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  SCONS_CACHE: ".scons-cache"

# Cache para acelerar builds
cache:
  paths:
    - .scons-cache/

# Build Linux (Debug + Release)
build:linux:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git pkg-config
    - pip3 install scons
  script:
    - scons target=$TARGET platform=linux arch=x86_64 debug_symbols=no -j2
    - strip project/addons/terrain_3d/bin/libterrain.*
  artifacts:
    name: "t3d-linux-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build Windows (Debug + Release)
build:windows:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git mingw-w64 pkg-config
    - pip3 install scons
  script:
    - scons target=$TARGET platform=windows arch=x86_64 debug_symbols=no -j2
    - strip project/addons/terrain_3d/bin/libterrain.*
  artifacts:
    name: "t3d-windows-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build macOS (usando cross-compile com osxcross)
build:macos:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git clang libc++-dev pkg-config
    - pip3 install scons
  script:
    - scons target=$TARGET platform=macos arch=universal debug_symbols=no -j2
  artifacts:
    name: "t3d-macos-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build Android ARM32
build:android-arm32:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git openjdk-11-jdk wget unzip pkg-config
    - pip3 install scons
    - wget -q https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
    - unzip -q android-ndk-r23c-linux.zip
    - export ANDROID_NDK_ROOT=$PWD/android-ndk-r23c
  script:
    - scons target=$TARGET platform=android arch=arm32 debug_symbols=no -j2
  artifacts:
    name: "t3d-android-arm32-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build Android ARM64
build:android-arm64:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git openjdk-11-jdk wget unzip pkg-config
    - pip3 install scons
    - wget -q https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
    - unzip -q android-ndk-r23c-linux.zip
    - export ANDROID_NDK_ROOT=$PWD/android-ndk-r23c
  script:
    - scons target=$TARGET platform=android arch=arm64 debug_symbols=no -j2
  artifacts:
    name: "t3d-android-arm64-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build iOS
build:ios:
  stage: build
  tags:
    - macos  # Precisa de runner macOS para iOS
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - brew install scons
  script:
    - scons target=$TARGET platform=ios arch=universal debug_symbols=no -j2
  artifacts:
    name: "t3d-ios-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Build Web
build:web:
  stage: build
  image: ubuntu:22.04
  parallel:
    matrix:
      - TARGET: [template_debug, template_release]
  before_script:
    - apt-get update -qq
    - apt-get install -y build-essential python3 python3-pip git pkg-config
    - pip3 install scons
    - git clone https://github.com/emscripten-core/emsdk.git
    - cd emsdk && ./emsdk install latest && ./emsdk activate latest && source ./emsdk_env.sh && cd ..
  script:
    - source emsdk/emsdk_env.sh
    - scons target=$TARGET platform=web threads=no debug_symbols=no -j2
  artifacts:
    name: "t3d-web-${TARGET}"
    paths:
      - project/
    expire_in: 1 week

# Package final com todas as plataformas
package:all:
  stage: package
  image: alpine:latest
  dependencies:
    - build:linux
    - build:windows
    - build:macos
    - build:android-arm32
    - build:android-arm64
    - build:ios
    - build:web
  before_script:
    - apk add --no-cache zip
  script:
    - cp README.md LICENSE.txt project/addons/terrain_3d/
    - zip -r terrain3d-all-platforms.zip project/
  artifacts:
    name: "terrain3d-complete"
    paths:
      - terrain3d-all-platforms.zip
    expire_in: 1 month